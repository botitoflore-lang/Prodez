<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Definitiva</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Pokédex</h1>
        <div class="filters">
            <input type="text" id="search-bar" placeholder="Buscar Pokémon (Ej: Vaporeon)...">
            <select id="region-filter">
                <option value="all">Todas las Regiones</option>
                <option value="kanto">Kanto</option>
                <option value="johto">Johto</option>
                <option value="hoenn">Hoenn</option>
                <!-- Añadir el resto de regiones -->
            </select>
        </div>
    </header>

    <main>
        <!-- Aquí se inyectarán las tarjetas de previsualización -->
        <div id="pokedex-grid" class="grid-container"></div>
    </main>

    <!-- Modal para la información detallada -->
    <div id="pokemon-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-header">
                <h2 id="modal-name">Nombre</h2>
                <img id="modal-model-3d" src="" alt="Modelo 3D" />
            </div>
            
            <div class="info-sections">
                <section class="types-weaknesses">
                    <h3>Tipos y Eficacia</h3>
                    <p><strong>Tipos:</strong> <span id="modal-types"></span></p>
                    <p><strong>Debilidades:</strong> <span id="modal-weaknesses"></span></p>
                    <p><strong>Fortalezas:</strong> <span id="modal-strengths"></span></p>
                </section>

                <section class="abilities">
                    <h3>Habilidades</h3>
                    <div id="modal-abilities">
                        <!-- Las habilidades con tooltip se generarán aquí -->
                    </div>
                </section>

                <section class="moves">
                    <h3>Ataques</h3>
                    <div class="move-tabs">
                        <button class="tab-btn active" onclick="showMoves('level')">Nivel</button>
                        <button class="tab-btn" onclick="showMoves('tm')">MT</button>
                        <button class="tab-btn" onclick="showMoves('egg')">Crianza</button>
                    </div>
                    <ul id="modal-moves-list"></ul>
                </section>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
