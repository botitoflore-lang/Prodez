<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Definitiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; margin: 0; font-family: system-ui, sans-serif; }
        
        /* Efecto de levitación para el modelo 3D */
        .model-3d {
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* Scrollbar personalizada para que se vea elegante */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        /* Evita que los textos largos rompan las tarjetas de movimientos */
        .truncate-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <input type="text" id="search-input" placeholder="Buscar Pokémon por nombre o ID..." 
               class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 mb-8 text-white focus:outline-none focus:border-red-500 transition-colors">
        
        <main id="pokemon-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></main>
        
        <!-- Detector de Scroll para cargar más -->
        <div id="sentinel" class="h-20 flex items-center justify-center text-slate-500 mt-4">Cargando...</div>
    </div>

    <!-- Modal de Detalles -->
    <div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4">
        <div id="modal-content" class="w-full max-w-5xl h-[90vh] flex flex-col justify-center">
            <!-- El contenido se inyecta por JS -->
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
