<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🇵🇹 Ultradex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
background:#111827;
padding:20px;
position:sticky;
top:0;
z-index:999;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.logo{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.logo img{
width:60px;
height:60px;
object-fit:contain;
}

.logo h1{
color:#facc15;
font-size:2.7rem;
cursor:pointer;
}

main{
padding:20px;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:25px;
}

input,select{
padding:12px;
border:none;
border-radius:12px;
font-size:1rem;
background:#1e293b;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:18px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.card:hover{
transform:translateY(-5px);
}

.pokemon-img{
width:100%;
height:180px;
object-fit:contain;
}

.big-img{
width:300px;
height:300px;
object-fit:contain;
display:block;
margin:auto;
}

.type{
display:inline-block;
padding:6px 12px;
border-radius:20px;
margin:4px;
font-size:0.9rem;
font-weight:bold;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.details{
background:#1e293b;
padding:25px;
border-radius:20px;
}

.info-box{
background:#334155;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.watermark{
position:fixed;
bottom:15px;
right:15px;
font-size:14px;
font-weight:bold;
color:white;
opacity:0.15;
pointer-events:none;
user-select:none;
}

@media (max-width:768px){

.logo{
flex-direction:column;
}

.logo h1{
font-size:2rem;
text-align:center;
}

.filters{
flex-direction:column;
align-items:center;
}

input,
select{
width:100%;
max-width:350px;
}

.big-img{
width:220px;
height:220px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">

<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">

<h1 onclick="loadPokedex()">
🇵🇹 Ultradex
</h1>

</div>

</header>

<main id="app"></main>

<div class="watermark">
Criado por Gabriel Neves
</div>

<script>

const typeColors={
normal:'#A8A878',
fire:'#F08030',
water:'#6890F0',
electric:'#F8D030',
grass:'#78C850',
ice:'#98D8D8',
fighting:'#C03028',
poison:'#A040A0',
ground:'#E0C068',
flying:'#A890F0',
psychic:'#F85888',
bug:'#A8B820',
rock:'#B8A038',
ghost:'#705898',
dragon:'#7038F8',
dark:'#705848',
steel:'#B8B8D0',
fairy:'#EE99AC'
};

let allPokemon=[];

document.addEventListener('DOMContentLoaded',()=>{
loadPokedex();
});

async function loadPokedex(){

const app=document.getElementById('app');

app.innerHTML=`

<div class="filters">

<input
id="pokemonSearch"
placeholder="Pesquisar Pokémon"
oninput="filterPokemon()">

<select id="regionFilter" onchange="filterPokemon()">

<option value="">Todas Regiões</option>

<option value="kanto">Kanto</option>
<option value="johto">Johto</option>
<option value="hoenn">Hoenn</option>
<option value="sinnoh">Sinnoh</option>
<option value="unova">Unova</option>
<option value="kalos">Kalos</option>
<option value="alola">Alola</option>
<option value="galar">Galar</option>
<option value="hisui">Hisui</option>
<option value="paldea">Paldea</option>

</select>

<select id="type1Filter" onchange="filterPokemon()">

<option value="">Tipo 1</option>

<option value="normal">Normal</option>
<option value="fire">Fire</option>
<option value="water">Water</option>
<option value="grass">Grass</option>
<option value="electric">Electric</option>
<option value="ice">Ice</option>
<option value="fighting">Fighting</option>
<option value="poison">Poison</option>
<option value="ground">Ground</option>
<option value="flying">Flying</option>
<option value="psychic">Psychic</option>
<option value="bug">Bug</option>
<option value="rock">Rock</option>
<option value="ghost">Ghost</option>
<option value="dragon">Dragon</option>
<option value="dark">Dark</option>
<option value="steel">Steel</option>
<option value="fairy">Fairy</option>

</select>

<select id="type2Filter" onchange="filterPokemon()">

<option value="">Qualquer Tipo 2</option>

<option value="normal">Normal</option>
<option value="fire">Fire</option>
<option value="water">Water</option>
<option value="grass">Grass</option>
<option value="electric">Electric</option>
<option value="ice">Ice</option>
<option value="fighting">Fighting</option>
<option value="poison">Poison</option>
<option value="ground">Ground</option>
<option value="flying">Flying</option>
<option value="psychic">Psychic</option>
<option value="bug">Bug</option>
<option value="rock">Rock</option>
<option value="ghost">Ghost</option>
<option value="dragon">Dragon</option>
<option value="dark">Dark</option>
<option value="steel">Steel</option>
<option value="fairy">Fairy</option>

</select>

</div>

<div id="pokemonGrid" class="grid"></div>

`;

await loadPokemonData();

renderPokemon(allPokemon);

}

async function loadPokemonData(){

allPokemon=[];

const response=await fetch(
'https://pokeapi.co/api/v2/pokemon?limit=1025'
);

const data=await response.json();

for(let i=0;i<data.results.length;i++){

const pokemon=data.results[i];

const id=i+1;

const pokeResponse=await fetch(
`https://pokeapi.co/api/v2/pokemon/${id}`
);

const pokeData=await pokeResponse.json();

const types=pokeData.types.map(t=>t.type.name);

let region='paldea';

if(id<=151) region='kanto';
else if(id<=251) region='johto';
else if(id<=386) region='hoenn';
else if(id<=493) region='sinnoh';
else if(id<=649) region='unova';
else if(id<=721) region='kalos';
else if(id<=809) region='alola';
else if(id<=905) region='galar';
else region='paldea';

if(pokeData.name.includes('hisui')){
region='hisui';
}

if(pokeData.name.includes('alola')){
region='alola';
}

if(pokeData.name.includes('galar')){
region='galar';
}

if(pokeData.name.includes('paldea')){
region='paldea';
}

allPokemon.push({
id:pokeData.id,
name:pokeData.name,
types:types,
region:region,
image:pokeData.sprites.other['official-artwork'].front_default
});

}

}

function renderPokemon(list){

const grid=document.getElementById('pokemonGrid');

grid.innerHTML='';

list.forEach(pokemon=>{

const displayName=pokemon.name
.replaceAll('-', ' ')
.replace('hisui','Hisui')
.replace('galar','Galar')
.replace('alola','Alola')
.replace('paldea','Paldea');

grid.innerHTML+=`

<div class="card"

onclick="openPokemon('${pokemon.name}')">

<img class="pokemon-img"
src="${pokemon.image}">

<h2>

#${pokemon.id}

${displayName}

</h2>

<div>

${pokemon.types.map(type=>`

<span class="type"
style="background:${typeColors[type]}">

${type}

</span>

`).join('')}

</div>

</div>

`;

});

}

function filterPokemon(){

const search=document
.getElementById('pokemonSearch')
.value
.toLowerCase();

const type1=document
.getElementById('type1Filter')
.value;

const type2=document
.getElementById('type2Filter')
.value;

const region=document
.getElementById('regionFilter')
.value;

let filtered=allPokemon.filter(pokemon=>{

const matchSearch=
pokemon.name.includes(search);

const matchRegion=
!region || pokemon.region===region;

let matchTypes=true;

if(type1 && !type2){

matchTypes=
pokemon.types.includes(type1);

}

if(type1 && type2){

matchTypes=
pokemon.types.includes(type1) &&
pokemon.types.includes(type2);

}

return matchSearch &&
matchRegion &&
matchTypes;

});

filtered.sort((a,b)=>a.id-b.id);

renderPokemon(filtered);

}

async function openPokemon(name){

const app=document.getElementById('app');

app.innerHTML='<h2>A carregar...</h2>';

const response=await fetch(
`https://pokeapi.co/api/v2/pokemon/${name}`
);

const data=await response.json();

const speciesResponse=await fetch(data.species.url);

const speciesData=await speciesResponse.json();

const desc=speciesData.flavor_text_entries.find(
e=>e.language.name==='en'
);

const evoResponse=await fetch(
speciesData.evolution_chain.url
);

const evoData=await evoResponse.json();

const evolutions=[];

function extractEvos(chain){

let evoDetails='';

if(chain.evolution_details.length){

const details=chain.evolution_details[0];

if(details.min_level){
evoDetails=`Lvl ${details.min_level}`;
}

else if(details.item){
evoDetails=`Use ${details.item.name}`;
}

else if(details.trigger){
evoDetails=details.trigger.name;
}

}

evolutions.push({
name:chain.species.name,
details:evoDetails || 'Base Form'
});

chain.evolves_to.forEach(e=>{
extractEvos(e);
});

}

extractEvos(evoData.chain);

let weaknesses=[];
let resistances=[];
let immunities=[];

const damageMap={};

for(const typeData of data.types){

const typeResponse=await fetch(typeData.type.url);

const typeInfo=await typeResponse.json();

typeInfo.damage_relations.double_damage_from.forEach(t=>{
damageMap[t.name]=(damageMap[t.name] || 1)*2;
});

typeInfo.damage_relations.half_damage_from.forEach(t=>{
damageMap[t.name]=(damageMap[t.name] || 1)*0.5;
});

typeInfo.damage_relations.no_damage_from.forEach(t=>{
damageMap[t.name]=0;
});

}

for(const type in damageMap){

const multiplier=damageMap[type];

if(multiplier===0){

immunities.push({
type:type,
value:'0x'
});

}

else if(multiplier>1){

weaknesses.push({
type:type,
value:`${multiplier}x`
});

}

else if(multiplier<1){

resistances.push({
type:type,
value:`${multiplier}x`
});

}

}

app.innerHTML=`

<button onclick="loadPokedex()">
⬅ Voltar
</button>

<br><br>

<div class="details">

<img class="big-img"
src="${data.sprites.other['official-artwork'].front_default}">

<h1>
#${data.id} ${data.name.toUpperCase()}
</h1>

<br>

<div>

${data.types.map(t=>`

<span class="type"
style="background:${typeColors[t.type.name]}">

${t.type.name}

</span>

`).join('')}

</div>

<br>

<div class="info-box">

<h3>Descrição Pokédex</h3>

<br>

<p>
${desc?.flavor_text.replace(/\f/g,' ') || 'Sem descrição.'}
</p>

</div>

<div class="info-box">

<h3>Evoluções</h3>

<br>

${evolutions.map(e=>`

<p>

<b>${e.name}</b>

- ${e.details}

</p>

`).join('')}

</div>

<div class="info-box">

<h3>Fraquezas</h3>

<br>

${weaknesses.map(w=>`

<span class="type"
style="background:${typeColors[w.type]}">

${w.type} (${w.value})

</span>

`).join('')}

</div>

<div class="info-box">

<h3>Resistências</h3>

<br>

${resistances.map(r=>`

<span class="type"
style="background:${typeColors[r.type]}">

${r.type} (${r.value})

</span>

`).join('')}

</div>

<div class="info-box">

<h3>Imunidades</h3>

<br>

${immunities.map(i=>`

<span class="type"
style="background:${typeColors[i.type]}">

${i.type} (${i.value})

</span>

`).join('')}

</div>

</div>

`;

}

</script>

</body>
  </html>
